- name: Run HAProxy container
  containers.podman.podman_container:
    name: haproxy
    image: haproxy:latest
    state: started
    recreate: true
    ports:
      - "8443:8443"
    volumes:
      - "{{ ansible_env.HOME }}/sou-lab-cni/containers_vols/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:Z"
      - "{{ ansible_env.HOME }}/sou-lab-cni/containers_vols/haproxy/certs:/usr/local/etc/haproxy/cert:Z"
